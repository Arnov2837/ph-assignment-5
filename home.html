<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      .glass-modal {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
      }
      .issue-card:hover {
        transform: translateY(-2px);
        transition: all 0.3s ease;
      }
    </style>
  </head>
  <body class="bg-[#F3F4F6] min-h-screen p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
      <header
        class="flex flex-col md:flex-row justify-between items-center bg-white p-4 rounded-xl shadow-sm mb-6"
      >
        <div class="flex items-center gap-2 mb-4 md:mb-0">
          <i class="fa-brands fa-github text-3xl"></i>
          <h1 class="text-xl font-bold text-slate-700">
            GitHub Issues Tracker
          </h1>
        </div>
        <div class="flex items-center gap-4 w-full md:w-auto">
          <div class="relative w-full md:w-80">
            <input
              type="text"
              id="searchInput"
              placeholder="Search Issues..."
              class="w-full pl-10 pr-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
            />
            <i
              class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-gray-400"
            ></i>
          </div>
          <button
            class="bg-[#4F46E5] text-white px-5 py-2 rounded-lg font-medium whitespace-nowrap"
          >
            + New Issue
          </button>
        </div>
      </header>

      <div class="bg-white p-4 rounded-xl shadow-sm mb-6">
        <div
          class="flex flex-col md:flex-row justify-between items-center gap-4"
        >
          <div class="flex bg-gray-100 p-1 rounded-lg">
            <button
              onclick="filterIssues('all')"
              id="btn-all"
              class="filter-btn px-6 py-2 rounded-md font-medium bg-indigo-600 text-white"
            >
              All
            </button>
            <button
              onclick="filterIssues('open')"
              id="btn-open"
              class="filter-btn px-6 py-2 rounded-md font-medium text-gray-600"
            >
              Open
            </button>
            <button
              onclick="filterIssues('closed')"
              id="btn-closed"
              class="filter-btn px-6 py-2 rounded-md font-medium text-gray-600"
            >
              Closed
            </button>
          </div>
          <div class="flex items-center gap-6">
            <div class="flex items-center gap-2">
              <span class="w-3 h-3 rounded-full bg-emerald-500"></span>
              <span class="text-sm font-medium text-gray-600">Open</span>
            </div>
            <div class="flex items-center gap-2">
              <span class="w-3 h-3 rounded-full bg-indigo-500"></span>
              <span class="text-sm font-medium text-gray-600">Closed</span>
            </div>
          </div>
        </div>
        <div class="mt-4 flex items-center gap-3">
          <div class="p-2 bg-indigo-100 rounded-lg text-indigo-600">
            <i class="fa-solid fa- virus"></i>
          </div>
          <div>
            <h3 id="issueCount" class="font-bold text-lg">0 Issues</h3>
            <p class="text-xs text-gray-400">
              Track and manage your project issues
            </p>
          </div>
        </div>
      </div>

      <div
        id="issuesGrid"
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4"
      ></div>
    </div>

    <div
      id="issueModal"
      class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4 z-50"
    >
      <div
        class="bg-white rounded-2xl w-full max-w-xl overflow-hidden shadow-2xl animate-in fade-in zoom-in duration-300"
      >
        <div class="p-6" id="modalContent"></div>
      </div>
    </div>

    <script src="script/home.js"></script>
  </body>
</html>
